name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      notes:
        description: 'Release notes / body'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

env:
  PROJECT_NAME: prawk

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache vendor/
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-linux-${{ hashFiles('download-deps.sh', 'patches/libtmt-prawk.patch') }}

      - name: Download deps
        run: |
          chmod +x ./download-deps.sh
          ./download-deps.sh

      - name: Install toolchain
        uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: '2.0.x'

      - name: Install X11 + freetype headers
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libfreetype-dev fontconfig

      - name: Install freetype Nim package
        run: nimble install -y freetype@0.1.2

      - name: Build
        run: |
          nim c --opt:size -d:release -d:strip -d:lto \
                --out:"$PROJECT_NAME" src/prawk.nim
          strip --strip-all "$PROJECT_NAME" || true

      - name: Size guard (<=500KB)
        run: |
          BYTES=$(stat -c%s "$PROJECT_NAME")
          echo "binary size: ${BYTES}"
          if [ "$BYTES" -gt 512000 ]; then
            echo "binary exceeds 500KB budget (${BYTES} > 512000)" >&2
            exit 1
          fi

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp "$PROJECT_NAME" dist/
          [ -f README.md ]    && cp README.md    dist/ || true
          [ -f gpl-3.0.txt ]  && cp gpl-3.0.txt  dist/ || true
          [ -d themes ]       && cp -R themes    dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: dist

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-zip
          path: linux-zip

      - name: Package
        run: |
          (cd linux-zip && zip -r "../${PROJECT_NAME}-linux.zip" .)

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ inputs.version }}" \
              "${PROJECT_NAME}-linux.zip" \
              --repo "${{ github.repository }}" \
              --title "${{ inputs.version }}" \
              --notes "${{ inputs.notes }}" \
              $PRERELEASE_FLAG
