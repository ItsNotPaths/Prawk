extensions: c, h, cc, cpp, cxx, hpp, hxx
comment_line: //
comment_block_open: /*
comment_block_close: */
string_delims: "'
operators: +-*/=<>!&|^~.,:;()[]{}?#
keywords: auto break case char const continue default do double else enum extern float for goto if inline int long register restrict return short signed sizeof static struct switch typedef union unsigned void volatile while _Bool _Complex _Imaginary bool true false NULL class new delete this namespace using template typename public private protected virtual override final friend operator nullptr
scope_keyword: keyword
scope_string: string
scope_comment: comment
scope_number: constant.numeric
scope_operator: keyword.operator
